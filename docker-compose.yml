services:
  web:
    build: .
    container_name: supps
    restart: unless-stopped
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      # Persistent app data (kuzu DB, abstracts, claims, json). Survives
      # rebuilds/recreations. Seeded once during the initial deploy — see DEPLOY.md.
      - supps-data:/app/data
    networks:
      - web-routing

# Shared external network the Caddy reverse proxy lives on. Caddy routes
# https://supps.teleosis.ai -> the `supps` container via dynamic upstreams.
networks:
  web-routing:
    external: true

volumes:
  supps-data:
    name: supps-data
